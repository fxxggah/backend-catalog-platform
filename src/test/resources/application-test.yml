spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

cloudinary:
  cloud-name: test-cloud
  api-key: test-key
  api-secret: test-secret

jwt:
  secret: 1234567890123456789012345678901212345678901234567890123456789012
  expiration: 86400000

google:
  client-id: test-client-id
